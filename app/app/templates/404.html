{% extends 'app/base.html' %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="text-center">
        <div class="display-1 fw-bold text-danger mb-4">
            <i class="bi bi-question-circle"></i>
        </div>
        <h1 class="display-5 fw-bold mb-3">Oops! Page not found</h1>
        <p class="lead text-muted mb-4 mx-auto" style="max-width: 500px;">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>
        <div class="d-grid d-md-block gap-2">
            <a href="{% url 'home' %}" class="btn btn-danger btn-lg rounded-pill px-5 shadow-sm">
                <i class="bi bi-house-door me-2"></i>Go Back Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
