{% extends 'app/base.html' %}
{% load static %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6 text-center">
            
            <div class="display-1 fw-bold text-danger mb-3">
                <i class="bi bi-emoji-frown"></i>
            </div>
            
            <h1 class="display-3 fw-bold mb-2">404</h1>
            <h3 class="mb-4 fw-bold">Page Not Found</h3>
            
            <div class="card border-0 shadow-sm rounded-5 p-4 mb-5 bg-white bg-opacity-75" 
                 style="backdrop-filter: blur(10px);">
                <p class="text-muted mb-0">
                    တောင်းပန်ပါတယ်၊ သင်ရှာဖွေနေတဲ့ စာမျက်နှာဟာ တည်ရှိခြင်းမရှိပါဘူး ဒါမှမဟုတ် ဖျက်လိုက်တာမျိုး ဖြစ်နိုင်ပါတယ်။
                </p>
            </div>

            <a href="{% url 'home' %}" class="btn btn-dark rounded-5 px-5 py-3 shadow-lg fw-bold haptic-btn">
                <i class="bi bi-house-fill me-2"></i>ပင်မစာမျက်နှာသို့ ပြန်သွားရန်
            </a>
            
        </div>
    </div>
</div>

<style>
    .haptic-btn:active { transform: scale(0.97); transition: 0.1s; }
    .card { border-radius: 2rem !important; }
    .btn { border-radius: 2rem !important; }
</style>
{% endblock %}
