{% load static %}
<div class="fixed-bottom p-3 d-flex justify-content-center">
    <ul class="nav nav-pills bg-dark rounded-pill shadow-lg d-flex align-items-center" 
        id="pillNav" role="tablist"
        style="width: fit-content; padding: 6px; gap: 4px; --bs-nav-pills-link-active-bg: #dc3545;">
        
        <li class="nav-item">
            <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{% url 'home' %}">
                <i class="bi bi-house-fill"></i>
            </a>
        </li>
        
        <li class="nav-item">
            <a class="nav-link {% if '/shop/' in request.path and '/favorites/' not in request.path %}active{% endif %}"
                href="{% url 'all-cats' %}">
                <i class="bi bi-grid-fill"></i>
            </a>
        </li>
        
        {% if request.user.is_authenticated %}
        <li class="nav-item">
            <a class="nav-link {% if '/favorites/' in request.path %}active{% endif %}"
                href="{% url 'favorites' %}">
                <i class="bi bi-heart-fill"></i>
            </a>
        </li>
        
        <li class="nav-item">
            <a class="nav-link {% if '/messages/' in request.path or '/message-center/' in request.path %}active{% endif %} position-relative"
                href="{% url 'message-center' %}">
                <i class="bi bi-chat-dots-fill"></i>
                {% if chat_unread_count > 0 %}
                <span id="unread-badge" 
                    class="position-absolute bg-danger border border-2 border-dark rounded-circle"
                    style="top: 15px; right: 15px; width: 12px; height: 12px;">
                </span>
                {% endif %}
            </a>
        </li>
        
        <li class="nav-item">
            <a class="nav-link {% if '/profile/' in request.path %}active{% endif %}"
                href="{% url 'profile' %}">
                <i class="bi bi-person-fill"></i>
            </a>
        </li>
        {% else %}
        <li class="nav-item">
            <a class="nav-link {% if request.path == '/login/' %}active{% endif %}" href="{% url 'login' %}">
                <i class="bi bi-person-fill"></i>
            </a>
        </li>
        {% endif %}
    </ul>
</div>

<style>
    #pillNav {
        display: flex;
        flex-wrap: nowrap;
    }

    #pillNav .nav-link {
        color: rgba(255, 255, 255, 0.6);
        aspect-ratio: 1 / 1;
        width: 65px;      /* Button size အကြီး */
        height: 65px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50% !important;
        font-size: 1.6rem; /* Icon size အကြီး */
        transition: all 0.2s ease;
        padding: 0;
    }

    #pillNav .nav-link.active {
        color: #fff;
        background-color: #dc3545 !important;
    }

    #pillNav .nav-link:active {
        transform: scale(0.95);
    }

    /* Mobile screen အတွက် ချိန်ညှိချက် */
    @media (max-width: 576px) {
        #pillNav .nav-link {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
        }
    }
</style>
