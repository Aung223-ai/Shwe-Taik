{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shwe Taik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{% static 'app/images/favicon.png' %}">
    {% block extra_head %}{% endblock %}
</head>

<body class="bg-light {% block body_class %}{% endblock %}">
    {% if not hide_top_nav %}
    {% include 'app/nav.html' %}
    {% endif %}

    {% if messages %}
    <div class="position-fixed top-0 end-0 p-3 z-3">
        {% for message in messages %}
        <div class="toast align-items-center text-bg-success border-0 show mb-2" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">{{ message }}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="container-xl px-2 px-sm-3 px-lg-4 py-3 {% block main_class %}pb-5 mb-5{% endblock %}">
        {% block content %}
        {% endblock %}
    </main>

    <div class="pb-5 mb-4"></div>

    <div class="fixed-bottom px-2 pd-0 bg-transparent">
        {% include 'app/bnav.html' %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>
</body>

</html>
