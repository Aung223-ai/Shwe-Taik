{% load static %}

<nav class="navbar-custom fixed-top w-100">
    <div class="nav-container d-flex align-items-center justify-content-between px-3">

        <a class="navbar-brand m-0 p-0 d-flex align-items-center" href="{% url 'landing' %}">
            <img width="40" height="40"
                 src="{% if landing.logo %}{{ landing.logo.url }}{% else %}{% static 'app/images/favicon.png' %}{% endif %}"
                 class="rounded-circle logo-img">
        </a>

        <div class="d-flex align-items-center gap-2 ms-auto">

            <form action="{% url 'all-sub-cats' %}" method="get" class="search-wrapper position-relative">
                <i class="bi bi-search search-icon"></i>
                <input type="text" name="q" id="liveSearchInput"
                       class="form-control search-input input-haptic"
                       placeholder="Search..." autocomplete="off">
                <!-- Live Search Dropdown -->
                <div id="liveSearchResults" class="dropdown-menu shadow-lg p-0 border-0" 
                     style="width: 250px; position: absolute; top: calc(100% + 5px); left: 0; display: none; z-index: 2000; border-radius: 12px; overflow: hidden;">
                    <div class="list-group list-group-flush" id="searchResultsList"></div>
                </div>
            </form>

            {% if request.user.is_authenticated %}
            <a class="nav-link cart-btn position-relative d-flex align-items-center justify-content-center"
               href="{% url 'cart' %}">
                <i class="bi bi-bag fs-5"></i>
                {% if cart_count > 0 %}
                <span class="cart-badge">{{ cart_count }}</span>
                {% endif %}
            </a>
            {% endif %}
        </div>
    </div>
</nav>

<style>
/* Navbar General Style */
.navbar-custom {
    background: #fff;
    padding-top: 10px;
    padding-bottom: 0;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    /* အပေါ်ဖြောင့် အောက်ဝိုင်း */
    border-bottom-left-radius: 2rem;
    border-bottom-right-radius: 2rem;
}

.nav-container {
    height: 50px;
}

/* Search width */
.search-wrapper {
    width: 140px;
}

.search-input {
    height: 34px;
    border-radius: 50px;
    background: #f5f5f5;
    border: none;
    padding-left: 34px;
    font-size: 13px;
}

.search-icon {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    font-size: 12px;
    color: #777;
}

/* Cart Button */
.cart-btn {
    width: 38px;
    height: 38px;
    color: #333;
}

/* 🔥 BADGE: BOTTOM-CENTER FIX */
.cart-badge {
    position: absolute;
    bottom: -2px;           /* အောက်ခြေ */
    left: 50%;             /* အလယ် */
    transform: translateX(-50%); /* အလယ်တည့်တည့်ကျအောင် */
    font-size: 0.6rem;
    padding: 2px 5px;
    background: #ff3b3b;
    color: #fff;
    border-radius: 50px;
    border: 2px solid #fff;
    min-width: 18px;
    text-align: center;
    line-height: 1;
    z-index: 10;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const searchInput = document.getElementById('liveSearchInput');
    const searchResults = document.getElementById('liveSearchResults');
    const resultsList = document.getElementById('searchResultsList');
    let debounceTimer;

    // Close when clicking outside
    document.addEventListener('click', function(e) {
        if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
            searchResults.style.display = 'none';
        }
    });

    searchInput.addEventListener('input', function() {
        const query = this.value.trim();
        clearTimeout(debounceTimer);
        
        if (query.length < 1) {
            searchResults.style.display = 'none';
            return;
        }

        debounceTimer = setTimeout(() => {
            fetch(`/shop/search-api/?q=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    resultsList.innerHTML = '';
                    if (data.results && data.results.length > 0) {
                        data.results.forEach(item => {
                            const imgHtml = item.image_url ? 
                                `<img src="${item.image_url}" style="width: 36px; height: 36px; object-fit: cover;" class="rounded border">` : 
                                `<div style="width: 36px; height: 36px;" class="bg-light rounded border d-flex align-items-center justify-content-center"><i class="bi bi-image text-muted"></i></div>`;
                            resultsList.innerHTML += `
                                <a href="/shop/products/${item.id}/" class="list-group-item list-group-item-action border-0 d-flex align-items-center p-2">
                                    ${imgHtml}
                                    <div class="ms-2 text-truncate" style="font-size: 0.85rem; width: 170px;">
                                        <div class="fw-bold text-dark">${item.name}</div>
                                        <div class="text-danger small fw-semibold">${item.price} Ks</div>
                                    </div>
                                </a>
                            `;
                        });
                        resultsList.innerHTML += `
                            <button type="submit" class="list-group-item list-group-item-action text-center border-top bg-light py-2 text-primary fw-bold" style="font-size: 0.85rem;">
                                View all results <i class="bi bi-arrow-right ms-1"></i>
                            </button>
                        `;
                        searchResults.style.display = 'block';
                    } else {
                        resultsList.innerHTML = `<div class="p-3 text-center text-muted small"><i class="bi bi-search me-1"></i> No products found.</div>`;
                        searchResults.style.display = 'block';
                    }
                })
                .catch(err => console.error("Search error:", err));
        }, 300); // 300ms delay to avoid overloading server
    });
});
</script>
