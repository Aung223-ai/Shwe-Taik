{% extends 'app/base.html' %}
{% load static %}
{% block content %}

<div class="col-12 col-md-10 col-lg-8 mx-auto">
    <div class="mt-4 mb-3">
        <h4 class="mb-0">Edit Profile</h4>
        <div class="text-muted small">Update your account information.</div>
    </div>

    <div class="card shadow-sm rounded-4">
        <div class="card-body p-3 p-md-4">
            <form method="post">
                {% csrf_token %}
                {% if error %}
                <div class="alert alert-danger py-2">{{ error }}</div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control" value="{{ request.user.first_name }}" placeholder="Full name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" value="{{ request.user.username }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="text" name="phone" class="form-control" value="{{ profile.phone }}" placeholder="09xxxxxxxx">
                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <textarea name="address" class="form-control" rows="3" placeholder="Address">{{ profile.address }}</textarea>
                </div>

                <div class="d-grid d-sm-flex gap-2">
                    <button type="submit" class="btn btn-danger rounded-pill"><i class="bi bi-check2 me-1"></i>Save</button>
                    <a href="{% url 'profile' %}" class="btn btn-outline-secondary rounded-pill"><i class="bi bi-x-lg me-1"></i>Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
