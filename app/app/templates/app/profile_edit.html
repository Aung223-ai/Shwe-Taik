{% extends 'app/base.html' %}
{% load static %}
{% block content %}

<div class="col-12 col-md-10 col-lg-7 col-xl-6 mx-auto pb-5 px-3">
    <div class="mt-4 mb-4 text-center">
        <h2 class="fw-bold mb-1">Edit Profile</h2>
        <div class="text-muted fs-5">Update your account and contact info.</div>
    </div>

    <div class="card shadow-sm border-0 rounded-5 overflow-hidden bg-white bg-opacity-75 p-4 p-md-5">
        <form method="post" class="vstack gap-4">
            {% csrf_token %}
            
            {% if error %}
            <div class="alert alert-danger border-0 rounded-5 py-3 fs-5 fw-bold">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
            </div>
            {% endif %}

            <div>
                <label class="form-label fw-bold fs-5 ps-2 text-secondary text-uppercase">Full Name</label>
                <input type="text" name="name" class="form-control rounded-5 py-3 fs-5 shadow-none border-2" value="{{ request.user.first_name }}" placeholder="Enter your name">
            </div>

            <div>
                <label class="form-label fw-bold fs-5 ps-2 text-secondary text-uppercase">Username</label>
                <input type="text" name="username" class="form-control rounded-5 py-3 fs-5 shadow-none border-2" value="{{ request.user.username }}" required>
            </div>

            <div>
                <label class="form-label fw-bold fs-5 ps-2 text-secondary text-uppercase">Phone Number</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-0 rounded-start-5 px-4 fs-5">
                        <i class="bi bi-telephone-fill text-muted"></i>
                    </span>
                    <input type="tel" name="phone" class="form-control rounded-end-5 py-3 fs-5 shadow-none border-2" value="{{ profile.phone }}" placeholder="09xxxxxxxx">
                </div>
            </div>

            <div>
                <label class="form-label fw-bold fs-5 ps-2 text-secondary text-uppercase">Shipping Address</label>
                <textarea name="address" class="form-control rounded-5 py-3 fs-5 shadow-none border-2" rows="3" placeholder="Enter your detailed address">{{ profile.address }}</textarea>
            </div>

            <div class="d-flex gap-3 pt-3">
                <a href="{% url 'profile' %}" class="btn btn-outline-dark rounded-5 py-3 fw-bold haptic-btn" 
                   style="min-height: 65px; flex: 2;">
                    <span class="fs-4">Cancel</span>
                </a>
                <button type="submit" class="btn btn-danger rounded-5 py-3 fw-bold haptic-btn shadow-sm" 
                        style="min-height: 65px; flex: 3;">
                    <i class="bi bi-check-circle-fill me-2 fs-4"></i><span class="fs-4">Save</span>
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    /* Input Fields Style */
    .form-control {
        background-color: rgba(255, 255, 255, 0.9) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .form-control:focus {
        border-color: #dc3545 !important;
        box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.1) !important;
    }

    /* Haptic feedback */
    .haptic-btn:active {
        transform: scale(0.97);
        transition: transform 0.1s ease;
    }
</style>
{% endblock %}
