{% extends 'app/base.html' %}
{% load static %}
{% block content %}

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="mb-4 text-center">
                <h4 class="fw-bold mb-1">Create Category</h4>
                <div class="text-muted small">Add a new main category to your shop.</div>
            </div>

            <div class="card rounded-5 shadow-sm border-0 bg-white">
                <div class="card-body p-4 p-md-5">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-secondary ps-2">Category Name</label>
                            <input type="text" name="name" class="form-control rounded-5 py-3 shadow-none border-0 bg-light px-4" placeholder="e.g. Mens Fashion" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-secondary ps-2">Upload Image</label>
                            
                            <div class="mb-3 d-flex justify-content-center bg-light rounded-5 border-0 p-3" id="previewContainer" style="display: none !important;">
                                <img id="imagePreview" src="#" alt="Preview" class="rounded-4 shadow-sm object-fit-cover" style="width: 120px; height: 120px;">
                            </div>

                            <input type="file" name="image" class="form-control rounded-5 py-3 shadow-none border-0 bg-light px-4" id="categoryImage" accept="image/*" required onchange="previewFile()">
                            <div class="form-text mt-2 text-muted px-2" style="font-size: 0.75rem;">
                                <i class="bi bi-info-circle me-1"></i>Recommended: Square image (1:1)
                            </div>
                        </div>

                        <div class="d-flex flex-row gap-2 mt-4">
                            <a href="{% url 'all-cats' %}" class="btn btn-outline-secondary rounded-5 py-3 fw-semibold flex-grow-1 border-0">
                                Cancel
                            </a>
                            <button type="submit" class="btn btn-dark rounded-5 py-3 fw-bold shadow-sm flex-grow-1">
                                <i class="bi bi-plus-circle-fill me-2"></i>Create
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function previewFile() {
        const preview = document.getElementById('imagePreview');
        const container = document.getElementById('previewContainer');
        const file = document.querySelector('input[type=file]').files[0];
        const reader = new FileReader();

        reader.onloadend = function () {
            preview.src = reader.result;
            container.style.setProperty('display', 'flex', 'important');
        }

        if (file) {
            reader.readAsDataURL(file);
        } else {
            preview.src = "";
            container.style.setProperty('display', 'none', 'important');
        }
    }
</script>

<style>
    .btn:active { transform: scale(0.97); transition: 0.1s; }
    .form-control { background: #f8f9fa !important; }
    .form-control:focus { background: #fff !important; box-shadow: 0 0 0 0.15rem rgba(0,0,0,0.05) !important; }
</style>

{% endblock %}
