{% extends 'app/base.html' %}
{% load static %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-5">
        <div class="mb-3">
            <h4 class="mb-1">Create Category</h4>
            <div class="text-muted small">Add a new main category.</div>
        </div>

        <div class="card rounded-4 shadow-sm border-0">
            <div class="card-body p-3 p-md-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Name</label>
                            <input type="text" name="name" class="form-control" placeholder="Category name" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Image</label>
                            <input type="file" name="image" class="form-control" accept="image/*" required>
                        </div>
                    </div>

                    <div class="d-flex flex-wrap gap-2 mt-4">
                        <button type="submit" class="btn btn-success rounded-pill"><i class="bi bi-check2 me-1"></i>Create</button>
                        <a href="{% url 'all-cats' %}" class="btn btn-outline-secondary rounded-pill"><i class="bi bi-x-lg me-1"></i>Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
