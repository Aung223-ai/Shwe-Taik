{% extends 'app/base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="fw-semibold">Edit Category</div>
            <a class="btn btn-danger rounded-pill" href="{% url 'cat-edit-list' %}">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
        </div>

        <div class="card rounded-4 shadow-sm border-0">
            <div class="card-body">
                <div class="text-center mb-3">
                    <img src="{{ cat.image.url }}" width="120" height="120" class="rounded-circle object-fit-cover border" alt="">
                </div>
                <form method="POST" enctype="multipart/form-data" class="vstack gap-3">
                    {% csrf_token %}
                    <div>
                        <label class="form-label fw-semibold">Name</label>
                        <input type="text" name="name" class="form-control" value="{{ cat.name }}" required>
                    </div>
                    <div>
                        <label class="form-label fw-semibold">Image (optional)</label>
                        <input type="file" name="image" class="form-control">
                    </div>
                    <button class="btn btn-danger rounded-pill w-100" type="submit">
                        <i class="bi bi-check-circle me-1"></i>Save Changes
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
