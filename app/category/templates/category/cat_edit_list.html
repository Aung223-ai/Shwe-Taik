{% extends 'app/base.html' %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <div class="fw-semibold">Edit Categories</div>
    <a class="btn btn-danger rounded-pill" href="{% url 'all-cats' %}">
        <i class="bi bi-arrow-left me-1"></i>Back
    </a>
</div>

<div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 g-3">
    {% for cat in cats %}
    <div class="col">
        <div class="card h-100 border-0 shadow-sm rounded-4 text-center">
            <div class="ratio ratio-1x1">
                <img class="w-100 h-100 object-fit-cover rounded-top-4" src="{{ cat.image.url }}" alt="">
            </div>
            <div class="card-body">
                <div class="fw-semibold mb-2">{{ cat.name }}</div>
                <a class="btn btn-danger rounded-pill w-100" href="{% url 'cat-edit' cat.id %}">
                    <i class="bi bi-pencil-square me-1"></i>Edit
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
