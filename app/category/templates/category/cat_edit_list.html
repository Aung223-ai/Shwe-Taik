{% extends 'app/base.html' %}
{% load static %}
{% block content %}

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 px-2">
        <div>
            <h4 class="fw-bold mb-1">Category Management</h4>
            <p class="text-muted small mb-0">Modify or remove your shop categories.</p>
        </div>
        <a class="btn btn-dark rounded-5 px-4 py-2 shadow-sm fw-bold" href="{% url 'all-cats' %}">
            <i class="bi bi-arrow-left me-2"></i>Back
        </a>
    </div>

    <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-3">
        {% for cat in cats %}
        <div class="col">
            <div class="card h-100 border-0 shadow-sm rounded-5 overflow-hidden transition-all hover-up">
                <div class="ratio ratio-1x1 bg-light">
                    <img class="object-fit-cover" src="{{ cat.image.url }}" alt="{{ cat.name }}">
                </div>

                <div class="card-body p-3 text-center">
                    <div class="fw-bold text-dark small text-truncate mb-3">{{ cat.name }}</div>
                    
                    <div class="d-flex gap-2">
                        <a class="btn btn-outline-danger rounded-5 flex-grow-1 py-2 fw-bold border-0" 
                           href="{% url 'cat-delete' cat.id %}" 
                           onclick="return confirm('Are you sure you want to delete {{ cat.name }}?')">
                            <i class="bi bi-trash"></i>
                        </a>
                        <a class="btn btn-dark rounded-5 flex-grow-1 py-2 fw-bold" 
                           href="{% url 'cat-edit' cat.id %}">
                            <i class="bi bi-pencil-square"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center py-5">
            <i class="bi bi-grid-3x3-gap display-1 text-muted opacity-25 mb-3 d-block"></i>
            <p class="text-muted">No categories found to manage.</p>
        </div>
        {% endfor %}
    </div>
</div>

<style>
    /* Card Hover Animation */
    .hover-up { transition: transform 0.3s ease; }
    .hover-up:hover { transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
    
    /* Button Style Adjustment */
    .btn { font-size: 0.85rem; }
    .btn-outline-danger:hover { background-color: #fee2e2 !important; color: #dc3545 !important; }
</style>

{% endblock %}
