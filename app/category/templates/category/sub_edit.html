{% extends 'app/base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="fw-semibold">Edit Product</div>
            <a class="btn btn-danger rounded-pill" href="{% url 'sub-edit-list' %}">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
        </div>

        <div class="card rounded-4 shadow-sm border-0">
            <div class="card-body">
                <div class="text-center mb-3">
                    <img src="{{ sub.image.url }}" width="120" height="120" class="rounded-circle object-fit-cover border" alt="">
                </div>
                <form method="POST" enctype="multipart/form-data" class="vstack gap-3">
                    {% csrf_token %}
                    <div>
                        <label class="form-label fw-semibold">Name</label>
                        <input type="text" name="name" class="form-control" value="{{ sub.name }}" required>
                    </div>
                    <div>
                        <label class="form-label fw-semibold">Category</label>
                        <select name="parent" class="form-select">
                            {% for cat in cats %}
                            <option value="{{ cat.id }}" {% if cat.id == sub.parent.id %}selected{% endif %}>
                                {{ cat.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="form-label fw-semibold">Image (optional)</label>
                        <input type="file" name="image" class="form-control">
                    </div>
                    <div>
                        <label class="form-label fw-semibold">Details</label>
                        <textarea name="details" class="form-control" rows="3">{{ sub.details }}</textarea>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Color</label>
                            <input type="text" name="color" class="form-control" value="{{ sub.color }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Size</label>
                            <input type="text" name="size" class="form-control" value="{{ sub.size }}">
                        </div>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Price</label>
                            <input type="number" step="0.01" name="price" class="form-control" value="{{ sub.price }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Discount Price</label>
                            <input type="number" step="0.01" name="discount_price" class="form-control" value="{{ sub.discount_price }}">
                        </div>
                    </div>
                    <div>
                        <label class="form-label fw-semibold">Stock</label>
                        <input type="number" name="stock" class="form-control" value="{{ sub.stock }}">
                    </div>
                    <button class="btn btn-danger rounded-pill w-100" type="submit">
                        <i class="bi bi-check-circle me-1"></i>Save Changes
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
