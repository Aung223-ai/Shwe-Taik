{% extends 'app/base.html' %}
{% load static %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="mb-3">
            <h4 class="mb-1">Create Sub Category</h4>
            <div class="text-muted small">Fill in product details for the sub category.</div>
        </div>

        <div class="card rounded-4 shadow-sm border-0">
            <div class="card-body p-3 p-md-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Name</label>
                            <input type="text" name="name" class="form-control" placeholder="Product name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Parent Category</label>
                            <select name="parent" class="form-select" required>
                                <option value="" selected disabled>Select category</option>
                                {% for cat in cats %}
                                <option value="{{ cat.id }}">{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Image</label>
                            <input type="file" name="image" class="form-control" accept="image/*" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Color</label>
                            <input type="text" name="color" class="form-control" placeholder="e.g. Red" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Size</label>
                            <input type="text" name="size" class="form-control" placeholder="e.g. M / L / XL" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Stock</label>
                            <input type="number" name="stock" class="form-control" min="0" placeholder="0" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Price (ks)</label>
                            <input type="number" name="price" class="form-control" min="0" step="0.01" placeholder="0.00" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Discount Price (ks)</label>
                            <input type="number" name="discount_price" class="form-control" min="0" step="0.01" placeholder="0.00">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Details</label>
                            <textarea name="details" class="form-control" rows="4" placeholder="Short description" required></textarea>
                        </div>
                    </div>

                    <div class="d-flex flex-wrap gap-2 mt-4">
                        <button type="submit" class="btn btn-success rounded-pill"><i class="bi bi-check2 me-1"></i>Create</button>
                        <a href="{% url 'all-sub-cats' %}" class="btn btn-outline-secondary rounded-pill"><i class="bi bi-x-lg me-1"></i>Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
