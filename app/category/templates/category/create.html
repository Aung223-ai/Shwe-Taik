{% extends 'app/base.html' %}
{% load static %}
{% block content %}

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-9 col-xl-8">
            
            <div class="mb-4 text-center">
                <h4 class="fw-bold mb-1">Add New Product</h4>
                <div class="text-muted small">Fill in the details to list a new item in your shop.</div>
            </div>

            <div class="card rounded-5 shadow-sm border-0 bg-white">
                <div class="card-body p-4 p-md-5">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <h6 class="fw-bold text-primary mb-3"><i class="bi bi-info-circle me-2"></i>General Information</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-7">
                                <label class="form-label small fw-bold text-secondary ps-2">Product Name</label>
                                <input type="text" name="name" class="form-control rounded-5 py-3 border-0 bg-light shadow-none px-4" placeholder="e.g. Premium Cotton T-Shirt" required>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label small fw-bold text-secondary ps-2">Parent Category</label>
                                <select name="parent" class="form-select rounded-5 py-3 border-0 bg-light shadow-none px-4" required>
                                    <option value="" selected disabled>Select category</option>
                                    {% for cat in cats %}
                                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold text-secondary ps-2">Upload Image</label>
                                <input type="file" name="image" class="form-control rounded-5 py-3 border-0 bg-light shadow-none px-4" accept="image/*" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-secondary ps-2">Color</label>
                                <input type="text" name="color" class="form-control rounded-5 py-3 border-0 bg-light shadow-none px-4" placeholder="e.g. Navy Blue" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-secondary ps-2">Size</label>
                                <input type="text" name="size" class="form-control rounded-5 py-3 border-0 bg-light shadow-none px-4" placeholder="e.g. M, L, XL" required>
                            </div>
                        </div>

                        <h6 class="fw-bold text-primary mb-3"><i class="bi bi-tags me-2"></i>Pricing & Inventory</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-secondary ps-2">Regular Price (ks)</label>
                                <input type="number" name="price" class="form-control rounded-5 py-3 border-0 bg-light shadow-none px-4" min="0" placeholder="0" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-secondary ps-2">Discount Price (ks)</label>
                                <input type="number" name="discount_price" class="form-control rounded-5 py-3 border-0 bg-light shadow-none px-4" min="0" placeholder="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-secondary ps-2">Stock Level</label>
                                <input type="number" name="stock" class="form-control rounded-5 py-3 border-0 bg-light shadow-none px-4" min="0" placeholder="0" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold text-secondary ps-2">Product Details</label>
                                <textarea name="details" class="form-control rounded-5 py-3 border-0 bg-light shadow-none px-4" rows="4" placeholder="Write description here..." required></textarea>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <a href="{% url 'all-sub-cats' %}" class="btn btn-outline-secondary rounded-5 py-3 px-4 fw-semibold flex-grow-1 border-0">
                                Cancel
                            </a>
                            <button type="submit" class="btn btn-dark rounded-5 py-3 px-4 fw-bold shadow-sm flex-grow-1">
                                <i class="bi bi-check-circle-fill me-2"></i>Create Product
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Styling */
    .form-control, .form-select { background: #f8f9fa !important; transition: 0.3s; }
    .form-control:focus, .form-select:focus { background: #fff !important; box-shadow: 0 0 0 0.15rem rgba(0,0,0,0.05) !important; }
    .btn:active { transform: scale(0.97); transition: 0.1s; }
</style>

{% endblock %}
